# Emko Temperature section
# ----------------
- unique_id: emko_current_temp
  name: Emko Current Value
  device:
    identifiers: Emko-Controler
    model_id: emko-3711
    name: Emko Temperature
    model: Emko 3711-HN
  state_class: measurement
  unit_of_measurement: "°C"
  device_class: temperature
  state_topic: emko/Temperature-Current
  value_template: "{{ ( value_json.data ) | float / 10 }}"
  enabled_by_default: true

